name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - run: npm run test

      - run: npm run audit:encoding

      - run: npm run audit:secrets

      - run: npm run audit:vulnerabilities

      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
